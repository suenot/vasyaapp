name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Desktop builds (Linux, macOS, Windows) ───────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: '--bundles deb,rpm'
            rust_targets: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_targets: 'x86_64-apple-darwin'
          - platform: windows-latest
            args: '--bundles nsis'
            rust_targets: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      # Linux: install WebKitGTK and other system dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: npm ci

      # Remove stt-sidecar from bundle — not building it in CI
      # To re-enable, build stt-sidecar before this step and remove this step
      - name: Remove stt-sidecar from bundle config
        shell: bash
        run: |
          jq 'del(.bundle.externalBin) | del(.bundle.resources)' src-tauri/tauri.conf.json > src-tauri/tauri.conf.tmp.json
          mv src-tauri/tauri.conf.tmp.json src-tauri/tauri.conf.json

      # Pre-download NSIS tools for Windows (Tauri's ureq HTTP client
      # fails with "protocol: http response missing version" on GitHub CDN)
      - name: Pre-download NSIS tools
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $nsisDir = "$env:LOCALAPPDATA\tauri\NSIS"
          New-Item -ItemType Directory -Force -Path $nsisDir | Out-Null

          # Download and extract NSIS
          curl.exe --retry 5 --retry-delay 3 -fSL -o "$env:TEMP\nsis-3.11.zip" `
            "https://github.com/tauri-apps/binary-releases/releases/download/nsis-3.11/nsis-3.11.zip"
          Expand-Archive -Path "$env:TEMP\nsis-3.11.zip" -DestinationPath $nsisDir -Force

          # Download NSIS Tauri utils plugin
          $pluginDir = "$nsisDir\nsis-3.11\Plugins\x86-unicode\additional"
          if (!(Test-Path $pluginDir)) {
            New-Item -ItemType Directory -Force -Path $pluginDir | Out-Null
          }
          curl.exe --retry 5 --retry-delay 3 -fSL -o "$pluginDir\nsis_tauri_utils.dll" `
            "https://github.com/tauri-apps/nsis-tauri-utils/releases/download/nsis_tauri_utils-v0.5.3/nsis_tauri_utils.dll"

          Write-Host "NSIS tools pre-downloaded to $nsisDir"
          Get-ChildItem -Recurse $nsisDir | Select-Object FullName | Format-Table -AutoSize

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          # macOS code signing (optional — set these secrets for signed builds):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'Vasyapp ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ─── Android build ────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install Android NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - run: npm ci

      # Remove stt-sidecar — Android uses Deepgram cloud STT
      - name: Remove stt-sidecar from bundle config
        run: |
          jq 'del(.bundle.externalBin) | del(.bundle.resources)' src-tauri/tauri.conf.json > src-tauri/tauri.conf.tmp.json
          mv src-tauri/tauri.conf.tmp.json src-tauri/tauri.conf.json

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Generate Android icons from app icon
        run: |
          sudo apt-get install -y imagemagick
          ICON="src-tauri/icons/icon.png"
          RES="src-tauri/gen/android/app/src/main/res"
          for entry in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            DPI="${entry%%:*}"
            SIZE="${entry##*:}"
            DIR="$RES/mipmap-$DPI"
            mkdir -p "$DIR"
            convert "$ICON" -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png"
            convert "$ICON" -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher_round.png"
          done

      # ── APK signing setup ──
      # If ANDROID_KEYSTORE_BASE64 secret is set → release build with your keystore
      # Otherwise → auto-generated keystore (for testing / dev releases)
      - name: Setup Android signing keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > /tmp/upload-keystore.jks
            echo "KS_PATH=/tmp/upload-keystore.jks" >> $GITHUB_ENV
            echo "KS_PASS=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASS=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            keytool -genkeypair -v \
              -keystore /tmp/upload-keystore.jks \
              -alias release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Vasyapp CI,O=Vasyapp,C=US"
            echo "KS_PATH=/tmp/upload-keystore.jks" >> $GITHUB_ENV
            echo "KS_PASS=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=release" >> $GITHUB_ENV
            echo "KEY_PASS=android" >> $GITHUB_ENV
          fi
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android APK
        run: npx tauri android build --apk true
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}

      # Sign the release APK (release builds are unsigned by default)
      - name: Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner -type f | sort -V | tail -1)
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign -type f | sort -V | tail -1)

          echo "Using apksigner: $APKSIGNER"
          echo "Using zipalign: $ZIPALIGN"

          for APK in $(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk"); do
            echo "── Signing: $APK"

            # Zipalign
            "$ZIPALIGN" -f 4 "$APK" "${APK%.apk}-aligned.apk"

            # Sign with v2 scheme
            "$APKSIGNER" sign \
              --ks "$KS_PATH" \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:$KS_PASS" \
              --key-pass "pass:$KEY_PASS" \
              --out "$APK" \
              "${APK%.apk}-aligned.apk"

            # Verify
            "$APKSIGNER" verify --verbose "$APK"
            rm -f "${APK%.apk}-aligned.apk"
            echo "✓ Signed successfully"
          done

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Rename APK with version
        env:
          APP_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          for APK in $(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk"); do
            DIR=$(dirname "$APK")
            mv "$APK" "$DIR/vasyapp-${APP_VERSION}-android-universal.apk"
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vasyapp-${{ steps.pkg.outputs.version }}-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
